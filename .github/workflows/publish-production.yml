name: publish-production

on:
  workflow_run:
    workflows: ['semantic-release']
    types: [completed]

permissions:
  contents: read

jobs:
  # Detect whether semantic-release actually published a new release in this run.
  # If it ran as a no-op (no release-worthy commits), skip all downstream jobs.
  get-release-tag:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      sha: ${{ steps.get-tag.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Get release tag if new release was published
        id: get-tag
        uses: ./.github/actions/get-release-tag
        with:
          repository: ${{ github.repository }}
          workflow-created-at: ${{ github.event.workflow_run.created_at }}

  # Job is skipped if tag is empty (no new release was published in this workflow_run).
  code-quality:
    needs: get-release-tag
    if: ${{ needs.get-release-tag.outputs.tag != '' }}
    uses: ./.github/workflows/shared-quality.yml

  # Job is skipped if tag is empty or if code-quality fails.
  publish-production:
    needs: [get-release-tag, code-quality]
    uses: ./.github/workflows/shared-docker.yml
    with:
      image-tag: ${{ needs.get-release-tag.outputs.tag }}
      push-latest: 'true'
      version: ${{ needs.get-release-tag.outputs.tag }}
      revision: ${{ needs.get-release-tag.outputs.sha }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
